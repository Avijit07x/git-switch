# git-cliff configuration — generates CHANGELOG.md from Conventional Commits.
# Run locally: `git cliff --output CHANGELOG.md` (after `cargo install git-cliff`).
# Or wait for the release workflow to run it for you on each tag push.

[changelog]
header = """
# Changelog

All notable changes to **Git Switch** are documented here.\n
This file is auto-generated from conventional-commits subjects on every
tagged release. The grouping below mirrors the commit `type:` prefixes.\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat",      group = "Features" },
  { message = "^fix",       group = "Bug fixes" },
  { message = "^perf",      group = "Performance" },
  { message = "^refactor",  group = "Refactor" },
  { message = "^docs",      group = "Documentation" },
  { message = "^style",     skip = true },
  { message = "^test",      group = "Tests" },
  { message = "^chore",     group = "Chore" },
  { message = "^ci",        group = "CI" },
  { message = "^build",     group = "Build" },
  { message = "^revert",    group = "Reverts" },
  { body = ".*",            group = "Other" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"
