name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── macOS universal build ─────────────────────────────────────────────
  build-macos:
    name: Build macOS (universal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for git-cliff

      - name: Install git-cliff
        if: startsWith(github.ref, 'refs/tags/')
        run: brew install git-cliff

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: git cliff --config cliff.toml --latest --strip header --output RELEASE_NOTES.md

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Setup Rust + macOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: release-universal

      - name: Install JS deps
        run: yarn install --frozen-lockfile

      - name: Build Tauri (universal)
        run: yarn tauri build --target universal-apple-darwin

      - name: Collect artifacts
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle"
          mkdir -p dist-release
          find "$BUNDLE_DIR/dmg" -name '*.dmg' -exec cp {} dist-release/ \; || true
          APP=$(find "$BUNDLE_DIR/macos" -maxdepth 1 -name '*.app' | head -n1)
          if [ -n "$APP" ]; then
            tar -C "$BUNDLE_DIR/macos" -czf "dist-release/$(basename "$APP" .app)-${GITHUB_REF_NAME}.app.tar.gz" "$(basename "$APP")"
          fi
          ls -lah dist-release/

      - name: Upload macOS artifacts to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
          files: |
            dist-release/*.dmg
            dist-release/*.tar.gz

      - name: Upload workflow artifacts (no tag)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: git-switch-macos-universal
          path: dist-release/*

  # ── Linux x86_64 build ────────────────────────────────────────────────
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: release-linux

      # Tauri needs WebKitGTK + GTK + libayatana-appindicator (for the tray)
      # plus librsvg2 (for the bundle icon step) and patchelf (for AppImage
      # path fixups). These are the canonical Tauri 2 Linux build deps.
      - name: Install Linux build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS deps
        run: yarn install --frozen-lockfile

      - name: Build Tauri (.deb + AppImage)
        run: yarn tauri build

      - name: Collect artifacts
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/release/bundle"
          mkdir -p dist-release
          find "$BUNDLE_DIR/deb" -name '*.deb' -exec cp {} dist-release/ \; || true
          find "$BUNDLE_DIR/appimage" -name '*.AppImage' -exec cp {} dist-release/ \; || true
          find "$BUNDLE_DIR/rpm" -name '*.rpm' -exec cp {} dist-release/ \; || true
          ls -lah dist-release/

      - name: Upload Linux artifacts to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            dist-release/*.deb
            dist-release/*.AppImage
            dist-release/*.rpm

      - name: Upload workflow artifacts (no tag)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: git-switch-linux-x86_64
          path: dist-release/*

  # ── Windows x86_64 build ──────────────────────────────────────────────
  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: release-windows

      - name: Install JS deps
        run: yarn install --frozen-lockfile

      - name: Build Tauri (.msi + .exe)
        run: yarn tauri build

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/release/bundle"
          mkdir -p dist-release
          find "$BUNDLE_DIR/msi" -name '*.msi' -exec cp {} dist-release/ \; || true
          find "$BUNDLE_DIR/nsis" -name '*.exe' -exec cp {} dist-release/ \; || true
          ls -lah dist-release/

      - name: Upload Windows artifacts to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            dist-release/*.msi
            dist-release/*.exe

      - name: Upload workflow artifacts (no tag)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: git-switch-windows-x86_64
          path: dist-release/*
