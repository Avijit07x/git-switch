name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

# Cancel an older run for the same ref if a new push comes in. Tag pushes
# rarely collide but workflow_dispatch reruns do; this keeps CI minutes from
# being burned on an obsolete build.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Release notes + draft release shell ───────────────────────────────
  # Runs first on tag pushes so all three build jobs upload into a release
  # that already has the changelog body. Without this, whichever build job
  # finishes first creates the release with an empty body, and later jobs
  # can't backfill it (softprops/action-gh-release@v2 only sets body on
  # create, not on update).
  prepare-release:
    name: Prepare release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          set -euo pipefail
          VERSION="2.6.1"
          ASSET="git-cliff-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -fsSL -o /tmp/git-cliff.tar.gz \
            "https://github.com/orhun/git-cliff/releases/download/v${VERSION}/${ASSET}"
          tar -xzf /tmp/git-cliff.tar.gz -C /tmp
          sudo mv /tmp/git-cliff-${VERSION}/git-cliff /usr/local/bin/git-cliff
          git-cliff --version

      - name: Generate release notes
        run: git-cliff --config cliff.toml --latest --strip header --output RELEASE_NOTES.md

      - name: Create release with notes
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          body_path: RELEASE_NOTES.md
          generate_release_notes: false

  # ── macOS universal build ─────────────────────────────────────────────
  build-macos:
    name: Build macOS (universal)
    runs-on: macos-14
    timeout-minutes: 30
    needs: [prepare-release]
    if: ${{ always() && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped') }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Setup Rust + macOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: release-universal

      - name: Install JS deps
        run: yarn install --frozen-lockfile

      - name: Build Tauri (universal)
        # bundle_dmg.sh on macos-14 occasionally flakes — hdiutil races with
        # AppleScript on cold runners. Retry up to 3 times. Subsequent attempts
        # are fast because rust-cache preserves the compiled artifacts.
        run: |
          for attempt in 1 2 3; do
            if yarn tauri build --target universal-apple-darwin; then
              echo "::notice::Tauri build succeeded on attempt $attempt"
              exit 0
            fi
            echo "::warning::Tauri build attempt $attempt failed, retrying"
            sleep 5
          done
          echo "::error::Tauri build failed after 3 attempts"
          exit 1

      - name: Collect artifacts
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle"
          mkdir -p dist-release
          find "$BUNDLE_DIR/dmg" -name '*.dmg' -exec cp {} dist-release/ \; || true
          APP=$(find "$BUNDLE_DIR/macos" -maxdepth 1 -name '*.app' | head -n1)
          if [ -n "$APP" ]; then
            tar -C "$BUNDLE_DIR/macos" -czf "dist-release/$(basename "$APP" .app)-${GITHUB_REF_NAME}.app.tar.gz" "$(basename "$APP")"
          fi
          ls -lah dist-release/

      - name: Upload macOS artifacts to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            dist-release/*.dmg
            dist-release/*.tar.gz

      - name: Upload workflow artifacts (no tag)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: git-switch-macos-universal
          path: dist-release/*

  # ── Linux x86_64 build ────────────────────────────────────────────────
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    needs: [prepare-release]
    if: ${{ always() && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped') }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: release-linux

      # Tauri needs WebKitGTK + GTK + libayatana-appindicator (for the tray)
      # plus librsvg2 (for the bundle icon step) and patchelf (for AppImage
      # path fixups). These are the canonical Tauri 2 Linux build deps.
      - name: Install Linux build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS deps
        run: yarn install --frozen-lockfile

      - name: Build Tauri (.deb + AppImage)
        run: yarn tauri build

      - name: Collect artifacts
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/release/bundle"
          mkdir -p dist-release
          find "$BUNDLE_DIR/deb" -name '*.deb' -exec cp {} dist-release/ \; || true
          find "$BUNDLE_DIR/appimage" -name '*.AppImage' -exec cp {} dist-release/ \; || true
          find "$BUNDLE_DIR/rpm" -name '*.rpm' -exec cp {} dist-release/ \; || true
          ls -lah dist-release/

      - name: Upload Linux artifacts to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            dist-release/*.deb
            dist-release/*.AppImage
            dist-release/*.rpm

      - name: Upload workflow artifacts (no tag)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: git-switch-linux-x86_64
          path: dist-release/*

  # ── Windows x86_64 build ──────────────────────────────────────────────
  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    timeout-minutes: 35
    needs: [prepare-release]
    if: ${{ always() && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped') }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: release-windows

      - name: Install JS deps
        run: yarn install --frozen-lockfile

      - name: Build Tauri (.msi + .exe)
        run: yarn tauri build

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/release/bundle"
          mkdir -p dist-release
          find "$BUNDLE_DIR/msi" -name '*.msi' -exec cp {} dist-release/ \; || true
          find "$BUNDLE_DIR/nsis" -name '*.exe' -exec cp {} dist-release/ \; || true
          ls -lah dist-release/

      - name: Upload Windows artifacts to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            dist-release/*.msi
            dist-release/*.exe

      - name: Upload workflow artifacts (no tag)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: git-switch-windows-x86_64
          path: dist-release/*
